name: Scrape AkashGo

on:
  workflow_dispatch: # Adds the manual trigger button!

jobs:
  update-akashgo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: softdev-pro/nexotv-api-full
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Run AkashGo Scraper
        working-directory: private-repo/AkashGo/Scripts
        run: python akash_go.py

      - name: Push to Private Repo
        working-directory: private-repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add AkashGo/akash_go_channels.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update AkashGo channels" && git push)
