name: Scrape CricHD

on:
  workflow_dispatch:

jobs:
  update-crichd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: softdev-pro/nexotv-api-full
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Run CricHD Scraper
        working-directory: private-repo/CricHD/Scripts
        run: python crichd_channels.py

      - name: Push to Private Repo
        working-directory: private-repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CricHD/crichd_channels.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update CricHD channels" && git push)
