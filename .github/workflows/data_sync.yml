name: Scrape TV

on:
  workflow_dispatch:

jobs:
  update-scrapetv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: softdev-pro/nexotv-api-full
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright requests beautifulsoup4 urllib3
          playwright install --with-deps chromium

      - name: Run ScrapeTV Combiner
        working-directory: private-repo/ScrapeTV/Scripts
        run: python combine.py > /dev/null 2>&1

      - name: Push to Private Repo
        working-directory: private-repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ScrapeTV/combined_events.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update ScrapeTV events" && git push)
