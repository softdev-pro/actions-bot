name: NXSP Schedule

on:

  workflow_dispatch:

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: softdev-pro/nexotv-api-full
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright requests urllib3
          playwright install --with-deps chromium

      - name: Run NexoSports Scraper
        working-directory: private-repo/NexoSports/Scripts
        run: python schedule_nexotv.py

      - name: Push to Private Repo
        working-directory: private-repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add NexoSports/schedule_playlists.json NexoSports/schedule_playlists_encrypted.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update nxsp schedule" && git push)
